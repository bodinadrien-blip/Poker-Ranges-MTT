<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Poker Ranges MTT Pro</title>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<style>
:root{
  --panel:#141820;
  --border:#1f2633;
  --text:#fff;
  --muted:#8a93a3;

  --utg:#2ecc71;
  --utg1:#2F8F6B;
  --hj:#9b59b6;
  --co:#3498db;
  --btn:#f39c12;
  --sb:#ff5c5c;
  --bb:#8f2d2d;

  --fold:#343b4a;
  --info:#7aa2ff;
  --info-active:#2ecc71;
}

body{
  margin:0;
  background:radial-gradient(circle at top,#121621,#07090c);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,Arial;
}

header{
  padding:14px;
  text-align:center;
  font-weight:800;
  background:#0a0c11;
  border-bottom:1px solid var(--border);
}

.container{padding:12px}

select,button{
  width:100%;
  padding:12px;
  margin-bottom:10px;
  border-radius:10px;
  border:1px solid var(--border);
  background:var(--panel);
  color:var(--text);
  font-size:15px;
  font-weight:600;
}

.buttons{display:flex;gap:8px}
  
.grid{
  grid-template-columns:repeat(13, minmax(24px,1fr));
}

.grid-wrapper{
  max-width:100%;
}

.cell{
  width:28px;
  height:28px;
  font-size:10px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:6px;
}
  
@media (min-width:768px){
  .grid{
    grid-template-columns:repeat(13, 52px);
    width:calc(13 * 52px + 24px);
    margin:0 auto;
  }
}

@media (min-width:1200px){
  .grid{
    grid-template-columns:repeat(13, 60px);
    width:calc(13 * 60px + 24px);
  }
}

.tight{background:#e53935;}
.loose{background:#8bc34a;}

.iso-tight{background:#90caf9;}
.iso-loose{background:#fff59d;color:#000;}
.iso-trash{background:#8bc34a;}

.legend{
  display:flex;
  justify-content:space-between;
  font-size:12px;
  margin:8px 0;
  color:var(--muted);
  flex-wrap:wrap;
  gap:6px;
}

.box{
  width:12px;
  height:12px;
  border-radius:3px;
}

#percent{
  text-align:center;
  font-weight:700;
  margin:8px 0;
}

.coach-on .cell{
  pointer-events:none;
  filter:brightness(.9);
}

#infoBtn{
  padding:10px;
  border-radius:10px;
  border:1px solid var(--border);
  background:#0e1220;
  color:var(--info);
}

#infoBtn.active{
  color:var(--info-active);
}

.info-bubble{
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:12px;
  padding:10px;
  margin-bottom:10px;
}

.hidden{display:none}

.export-zone{
  background:#07090c;
  padding:12px;
  border-radius:12px;
}

@media (hover:none){
  .cell:hover{
    transform:none;
    filter:none;
  }
}
</style>
</head>

<body>

<header>♠️ POKER RANGES — MTT PRO</header>

<div class="container">

<select id="action">
  <option value="open3bet">Open 3bet</option>
  <option value="open3betisolip">Open 3bet iso lip</option>
</select>

<select id="position"></select>
  
<select id="stack"></select>

<button id="infoBtn">ⓘ Notes</button>

<div id="infoBubble" class="info-bubble hidden">
  <textarea id="infoText"></textarea>
  <button id="saveInfo">💾 Save</button>
</div>

<div id="percent"></div>

<div class="grid-wrapper export-zone">
<div id="sizingLegend" class="legend"></div>
<div id="grid" class="grid"></div>

</div>

<div id="stats"></div>

<!-- LIGNE 1 -->
<div class="buttons">
  <button id="coachToggle">🧠 Coach : ON</button>
  <button id="viewMode">👁️ Viewer</button>
  <button onclick="exportImage()">📤 Image</button>
</div>

<!-- LIGNE 2 -->
<div class="buttons">
  <button onclick="exportAll()">💾 Export ranges</button>
  <button onclick="importAll()">📂 Import ranges</button>
</div>

<script>
const ranks=["A","K","Q","J","T","9","8","7","6","5","4","3","2"];
const grid=document.getElementById("grid");
const stack=document.getElementById("stack");
const percent=document.getElementById("percent");
const action=document.getElementById("action");
const position=document.getElementById("position");

let coachMode=true;
let viewMode=false;

/* CONFIG */
const CONFIG={
  open3bet:{
    positions:["LJ/UTG","HJ","CO","BTN","SB"],
    sizings:[
      {label:"3x Tight",class:"tight"},
      {label:"3x Loose",class:"loose"}
    ]
  },
  open3betisolip:{
    positions:[
      "HJ vs UTG",
      "CO vs HJ/UTG",
      "BTN vs CO/HJ/UTG",
      "BB vs SB",
      "SB vs All"
    ],
    sizings:[
      {label:"Iso Tight",class:"iso-tight"},
      {label:"Iso Loose",class:"iso-loose"},
      {label:"Iso Poubelle SB",class:"iso-trash"}
    ]
  }
};

/* UPDATE UI */
function updateUI(){
  position.innerHTML="";
  CONFIG[action.value].positions.forEach(p=>{
    const o=document.createElement("option");
    o.textContent=p;
    o.value=p;
    position.appendChild(o);
  });

  stack.innerHTML="";
  CONFIG[action.value].sizings.forEach(s=>{
    const o=document.createElement("option");
    o.textContent=s.label;
    o.value=s.class;
    stack.appendChild(o);
  });

  updateLegend();
}

/* LÉGENDE */
function updateLegend(){
  const legend=document.getElementById("sizingLegend");
  legend.innerHTML="";

  CONFIG[action.value].sizings.forEach(s=>{
    const item=document.createElement("div");

    item.innerHTML = `
      <div style="display:flex;align-items:center;gap:4px;">
        <div style="width:12px;height:12px;border-radius:3px;" class="${s.class}"></div>
        ${s.label}
      </div>
    `;

    legend.appendChild(item);
  });
}

/* KEY */
function rangeKey(){
  return `range_${action.value}_${position.value}`;
}

/* COULEUR SPLIT */
function getSplitColor(obj){
  const entries = Object.entries(obj);

  if(entries.length === 1){
    return getColor(entries[0][0]);
  }

  if(entries.length === 2){
    const [a,b] = entries;
    return `linear-gradient(to right,
      ${getColor(a[0])} 50%,
      ${getColor(b[0])} 50%)`;
  }

  return "#444";
}

function getColor(type){
  return {
    "tight":"#e53935",
    "loose":"#8bc34a",
    "iso-tight":"#90caf9",
    "iso-loose":"#fff59d",
    "iso-trash":"#8bc34a"
  }[type] || "#444";
}

/* BUILD */
function build(){
  grid.innerHTML="";
  const saved=JSON.parse(localStorage.getItem(rangeKey())||"{}");

  ranks.forEach((r,i)=>ranks.forEach((c,j)=>{
    const h=i===j?r+r:i<j?r+c+"s":c+r+"o";

    const d=document.createElement("div");
    d.textContent=h;

    if(saved[h]){
  const val = saved[h][stack.value];

  if(val){
    d.className = "cell " + stack.value;
  }else{
    d.className = "cell fold";
  }
}else{
  d.className = "cell fold";
}

    d.onclick=()=>{
  if(coachMode) return;

  if(!saved[h]) saved[h]={};

  const key = stack.value;

  if(!saved[h][key]) saved[h][key]=0;

  saved[h][key]+=0.5;

  if(saved[h][key]>=1) delete saved[h][key];

  if(Object.keys(saved[h]).length===0){
    delete saved[h];
  }

  localStorage.setItem(rangeKey(),JSON.stringify(saved));
  build();
};

    d.classList.add("cell");
    grid.appendChild(d);
  }));

  updatePercent(saved);
  updateSizingStats(saved);
}

/* % GLOBAL */
function updatePercent(saved){
  const count=Object.keys(saved).length;
  percent.textContent=`${(count/169*100).toFixed(1)}%`;
}

/* % PAR SIZING */
function updateSizingStats(saved){
  let stats={};

  Object.values(saved).forEach(obj=>{
    Object.entries(obj).forEach(([k,v])=>{
      stats[k]=(stats[k]||0)+v;
    });
  });

  let text="";
  Object.entries(stats).forEach(([k,v])=>{
    text+=`${k}: ${(v/169*100).toFixed(1)}% | `;
  });

  document.getElementById("stats").textContent=text;
}

/* EXPORT IMAGE */
function exportImage(){
  const wrapper=document.querySelector('.export-zone');

  const name=[
    action.value,
    position.value,
    stack.value
  ].join("_");

  html2canvas(wrapper,{scale:2}).then(c=>{
    const a=document.createElement("a");
    a.href=c.toDataURL();
    a.download=name+".png";
    a.click();
  });
}

/* EXPORT JSON */
function exportAll(){
  const data={};

  Object.keys(localStorage).forEach(k=>{
    if(k.startsWith("range_")){
      data[k]=JSON.parse(localStorage.getItem(k));
    }
  });

  const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="ranges_backup.json";
  a.click();
}

/* IMPORT */
function importAll(){
  const input=document.createElement("input");
  input.type="file";
  input.accept="application/json";

  input.onchange=e=>{
    const reader=new FileReader();
    reader.onload=()=>{
      const data=JSON.parse(reader.result);
      Object.entries(data).forEach(([k,v])=>{
        localStorage.setItem(k,JSON.stringify(v));
      });
      build();
      alert("✅ Import terminé");
    };
    reader.readAsText(e.target.files[0]);
  };

  input.click();
}

/* COACH */
const coachBtn=document.getElementById("coachToggle");
coachBtn.onclick=()=>{
  coachMode=!coachMode;
  document.body.classList.toggle("coach-on",coachMode);
  coachBtn.textContent=coachMode?"🧠 Coach : ON":"🧠 Coach : OFF";
};

/* EVENTS */
action.onchange=()=>{updateUI();build();};
position.onchange=build;
stack.onchange=build;

/* INIT */
updateUI();
build();
</script>

</body>
</html>
