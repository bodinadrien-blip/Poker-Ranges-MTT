  <!DOCTYPE html>
  <html lang="fr">
  <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Poker Ranges MTT Pro</title>
  
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  
  <style>
  :root{
    --panel:#141820;
    --border:#1f2633;
    --text:#fff;
    --muted:#8a93a3;
  
    --utg:#2ecc71;
    --utg1:#2F8F6B;
    --hj:#9b59b6;
    --co:#3498db;
    --btn:#f39c12;
    --sb:#ff5c5c;
    --bb:#8f2d2d;
  
    --fold:#343b4a;
    --info:#7aa2ff;
    --info-active:#2ecc71;
  }
  
  body{
    margin:0;
    background:radial-gradient(circle at top,#121621,#07090c);
    color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,Arial;
  }
  
  header{
    padding:14px;
    text-align:center;
    font-weight:800;
    background:#0a0c11;
    border-bottom:1px solid var(--border);
  }
  
  .container{padding:12px}
  
  select,button{
    width:100%;
    padding:12px;
    margin-bottom:10px;
    border-radius:10px;
    border:1px solid var(--border);
    background:var(--panel);
    color:var(--text);
    font-size:15px;
    font-weight:600;
  }
  
  .buttons{display:flex;gap:8px}
  
  .grid{
    display:grid;
    grid-template-columns:repeat(13, minmax(24px,1fr));
    gap:2px;
    width:100%;
  }
    
  .grid-wrapper{
    overflow-x:auto;
    padding:4px; /* évite coupe sur bords iOS */
  }
  
  .cell{
  aspect-ratio:1/1;
  font-size:clamp(9px,2.8vw,16px); /* x1.5 */
  
  display:flex;
  align-items:center;
  justify-content:center;
  
  text-align:center;
  font-weight:600;
  }
    
  .body{
    touch-action:manipulation;
  }
    
  @media (min-width:768px){
    .grid{
      grid-template-columns:repeat(13, 52px);
      width:calc(13 * 52px + 24px);
      margin:0 auto;
    }
  }
  
  @media (min-width:1200px){
    .grid{
      grid-template-columns:repeat(13, 60px);
      width:calc(13 * 60px + 24px);
    }
  }
  
  .tight{background:#e53935;}
  .loose{background:#8bc34a;}
  
  .iso-tight{background:#90caf9;}
  .iso-loose{background:#b38f00;color:#fff;
    text-shadow:0 1px 2px rgba(0,0,0,0.6);}
  .iso-trash{background:#8bc34a;}
  
  .bet3-tight{background:#ef5350;}
  .bet3-loose{background:#b38f00;color:#fff;
    text-shadow:0 1px 2px rgba(0,0,0,0.6);}
  .call-3bet{background:#8bc34a;}

  .bet4{background:#ef5350;}
  .call{background:#8bc34a;}
  .fold{background:#343b4a;color:#fff;}

  .bet3{background:#ef5350;}
  .call-mid{background:#8bc34a;}
  .call-small{background:#b38f00;color:#fff;
    text-shadow:0 1px 2px rgba(0,0,0,0.6);}

  .squeeze{background:#64b5f6;}
  
  
  .legend{
    display:flex;
    justify-content:space-between;
    font-size:12px;
    margin:8px 0;
    color:var(--muted);
    flex-wrap:wrap;
    gap:6px;
  }
  
  .box{
    width:12px;
    height:12px;
    border-radius:3px;
  }
  
  #percent{
    text-align:center;
    font-weight:700;
    margin:8px 0;
  }
  
  .coach-on .cell{
    pointer-events:none;
    filter:brightness(.9);
  }
  
  .export-zone{
    background:#07090c;
    padding:12px;
    border-radius:12px;
  }
  
  @media (hover:none){
    .cell:hover{
      transform:none;
      filter:none;
    }
  }
  </style>
  </head>
  
  <body>
  
  <header>♠️ POKER RANGES — MTT PRO</header>
  
  <div class="container">
  
<select id="action">
  <option value="open3bet">Open 3bet</option>
  <option value="open3betisolip">Open 3bet iso lip</option>
  <option value="bet3IP">3bet IP</option>  
  <option value="bet3SB">3bet SB</option>  
  <option value="vs3betIP">vs 3bet IP</option>  
  <option value="vs3betOP">vs 3bet OP</option>    
  <option value="BBdefense">BB défense</option>  
  <option value="squeeze">Squeeze</option>    
  <option value="squeezeBB">Squeeze BB</option>      
</select>
  
  <select id="position"></select>
    
  <select id="stack"></select>
  
  <div class="grid-wrapper export-zone">
  <div id="sizingLegend" class="legend"></div>
  <div id="grid" class="grid"></div>
  
  <div id="totalStats" style="
    text-align:center;
    margin-top:8px;
    font-weight:700;
    font-size:13px;
  "></div>
  
  </div>
  
  <!-- LIGNE 1 -->
  <div class="buttons">
    <button id="coachToggle">🧠 Coach : ON</button>
    <button onclick="exportImage()">📤 Image</button>
  </div>
  
  <!-- LIGNE 2 -->
  <div class="buttons">
    <button onclick="exportAll()">💾 Export ranges</button>
    <button onclick="importAll()">📂 Import ranges</button>
    <button id="clearRange">🗑️ Clear</button>
  </div>
  
  <script>
  const ranks=["A","K","Q","J","T","9","8","7","6","5","4","3","2"];
  const grid=document.getElementById("grid");
  const stack=document.getElementById("stack");
  const percent=document.getElementById("percent");
  const action=document.getElementById("action");
  const position=document.getElementById("position");
  
  let coachMode=true;
  
  /* CONFIG */
const CONFIG={

  open3bet:{
    positions:["LJ/UTG","HJ","CO","BTN","SB"],
    sizings:[
      {label:"3x Tight",class:"tight"},
      {label:"3x Loose",class:"loose"},
      {label:"Fold",class:"fold"}
    ]
  },

  open3betisolip:{
    positions:["HJ vs UTG","CO vs HJ/UTG","BTN vs CO/HJ/UTG","BB vs SB","SB vs All"],
    sizings:[
      {label:"Iso Tight",class:"iso-tight"},
      {label:"Iso Loose",class:"iso-loose"},
      {label:"Iso Poubelle SB",class:"iso-trash"},
      {label:"Fold",class:"fold"}
    ]
  },

  bet3IP:{
    positions:["HJ vs UTG","CO vs UTG","BTN vs UTG","BTN vs HJ","BTN vs CO"],
    sizings:[
      {label:"3bet Tight",class:"bet3-tight"},
      {label:"3bet Loose",class:"bet3-loose"},
      {label:"Call 3bet",class:"call-3bet"},
      {label:"Fold",class:"fold"}
    ]
  },

  bet3SB:{
    positions:["SB vs UTG","SB vs HJ","SB vs CO","SB vs BTN"],
    sizings:[
      {label:"3bet Tight",class:"bet3-tight"},
      {label:"3bet Loose",class:"bet3-loose"},
      {label:"Call 3bet",class:"call-3bet"},
      {label:"Fold",class:"fold"}
      ]
  },

  vs3betIP:{
    positions:["UTG vs Blinds","HJ vs Blinds","CO vs Blinds","BTN vs Blinds"],
    sizings:[
      {label:"4bet",class:"bet4"},
      {label:"Call",class:"call"},
      {label:"Fold",class:"fold"}
    ]
  },

  vs3betOP:{
    positions:["UTG vs HJ/CO","UTG vs BTN","HJ vs CO","HJ vs BTN","CO vs BTN","SB vs BB"],
    sizings:[
      {label:"4bet",class:"bet4"},
      {label:"Call",class:"call"},
      {label:"Fold",class:"fold"}
    ]
  },

  BBdefense:{
    positions:["vs UTG","vs HJ","vs CO","vs BTN","vs SB"],
    sizings:[
      {label:"3bet",class:"bet3"},
      {label:"Call vs 2.5/3bb",class:"call-mid"},
      {label:"Call vs 2bb",class:"call-small"},
      {label:"Fold",class:"fold"}
    ]
  },

  squeeze:{
    positions:["BTN vs HJ+CO","SB vs HJ+LJ","SB vs LJ+BTN","SB vs HJ+BTN","SB vs CO+BTN"],
    sizings:[
      {label:"Squeeze",class:"squeeze"},
      {label:"Call",class:"call"},
      {label:"Fold",class:"fold"}
    ]
  },

  squeezeBB:{
    positions:["BB vs LJ+BTN","BB vs HJ+BTN","BB vs CO+BTN","BB vs BTN+SB"],
    sizings:[
      {label:"Squeeze",class:"squeeze"},
      {label:"Call",class:"call"},
      {label:"Fold",class:"fold"}
    ]
  }

};
  
  /* UPDATE UI */
function updateUI(){

  if(!CONFIG[action.value]){
    console.warn("Action non configurée:", action.value);
    return;
  }

  position.innerHTML="";
  CONFIG[action.value].positions.forEach(p=>{
    const o=document.createElement("option");
    o.textContent=p;
    o.value=p;
    position.appendChild(o);
  });

  stack.innerHTML="";
  CONFIG[action.value].sizings.forEach(s=>{
    const o=document.createElement("option");
    o.textContent=s.label;
    o.value=s.class;
    stack.appendChild(o);
  });

  updateLegend();
} 
  
  /* LÉGENDE */
function updateLegend(){

  const legend = document.getElementById("sizingLegend");
  legend.innerHTML = "";

  const saved = JSON.parse(localStorage.getItem(rangeKey()) || "{}");

  function getCombos(hand){
    if(hand[0] === hand[1]) return 6;
    if(hand.endsWith("s")) return 4;
    return 12;
  }

  let stats = {};

  // 🔥 on compte les combos réels par sizing
  Object.entries(saved).forEach(([hand, obj]) => {

    const combos = getCombos(hand);

    Object.keys(obj).forEach(k => {
      if(k !== "fold"){ // ignore fold
        stats[k] = (stats[k] || 0) + combos;
      }
    });

  });

  const TOTAL = 1326;

  CONFIG[action.value].sizings
    .filter(s => s.class !== "fold")
    .forEach(s => {

      const raw = (stats[s.class] || 0) / TOTAL * 100;
      const percent = raw > 0 ? raw.toFixed(2) : "0";

      const item = document.createElement("div");

      item.innerHTML = `
        <div style="display:flex;align-items:center;gap:4px;">
          <div style="width:12px;height:12px;border-radius:3px;" class="${s.class}"></div>
          ${s.label} (${percent}%)
        </div>
      `;

      legend.appendChild(item);
    });
}
  
  /* KEY */
  function rangeKey(){
    return `range_${action.value}_${position.value}`;
  }
  
  /* COULEUR SPLIT */
  function getSplitColor(obj){
    const entries = Object.entries(obj);
  
    if(entries.length === 1){
      return getColor(entries[0][0]);
    }
  
    if(entries.length === 2){
      const [a,b] = entries;
      return `linear-gradient(to right,
        ${getColor(a[0])} 50%,
        ${getColor(b[0])} 50%)`;
    }
  
    return "#444";
  }
  
function getColor(type){
  return {

    /* OPEN */
    "tight":"#e53935",
    "loose":"#8bc34a",

    /* ISO */
    "iso-tight":"#90caf9",
    "iso-loose":"#b38f00",
    "iso-trash":"#8bc34a",

    /* 3BET */
    "bet3-tight":"#ef5350",
    "bet3-loose":"#b38f00",
    "call-3bet":"#8bc34a",

    /* VS 3BET */
    "bet4":"#ef5350",
    "call":"#8bc34a",
    "fold":"#343b4a",

    /* BB DEFENSE */
    "bet3":"#ef5350",
    "call-mid":"#8bc34a",
    "call-small":"#b38f00",

    /* SQUEEZE */
    "squeeze":"#64b5f6"

  }[type] || "#444";
}
  
  /* BUILD */
  function build(){
    grid.innerHTML="";
    const saved=JSON.parse(localStorage.getItem(rangeKey())||"{}");
  
    ranks.forEach((r,i)=>ranks.forEach((c,j)=>{
      const h=i===j?r+r:i<j?r+c+"s":c+r+"o";
  
      const d=document.createElement("div");
      d.textContent=h;
  
      if(saved[h]){
    d.style.background = getSplitColor(saved[h]);
  }else{
    d.className = "cell fold";
  }
  
      d.onclick=()=>{
    if(coachMode) return;
  
    if(!saved[h]) saved[h]={};
  
    const key = stack.value;
  
    if(!saved[h][key]) saved[h][key]=0;
  
    saved[h][key]+=0.5;
  
    if(saved[h][key]>=1) delete saved[h][key];
  
    if(Object.keys(saved[h]).length===0){
      delete saved[h];
    }
  
    localStorage.setItem(rangeKey(),JSON.stringify(saved));
    build();
  };
  
      d.classList.add("cell");
      grid.appendChild(d);
    }));
  
    updateLegend();
    updateTotalStats(saved);
  }
  
  /* % GLOBAL */
  function updatePercent(saved){
    const count=Object.keys(saved).length;
    percent.textContent=`${(count/169*100).toFixed(1)}%`;
  }
  
  /* % PAR SIZING */
  function updateSizingStats(saved){
    let stats={};
  
    Object.values(saved).forEach(obj=>{
      Object.entries(obj).forEach(([k,v])=>{
        stats[k]=(stats[k]||0)+v;
      });
    });
  
    let text="";
    Object.entries(stats).forEach(([k,v])=>{
      text+=`${k}: ${(v/169*100).toFixed(1)}% | `;
    });
  
    document.getElementById("stats").textContent=text;
  }
  
  /* EXPORT IMAGE */
  function exportImage(){
    const wrapper=document.querySelector('.export-zone');
  
    const name=[
      action.value,
      position.value,
      stack.value
    ].join("_");
  
    html2canvas(wrapper,{scale:2}).then(c=>{
      const a=document.createElement("a");
      a.href=c.toDataURL();
      a.download=name+".png";
      a.click();
    });
  }
  
  /* EXPORT JSON */
  function exportAll(){
    const data={};
  
    Object.keys(localStorage).forEach(k=>{
      if(k.startsWith("range_")){
        data[k]=JSON.parse(localStorage.getItem(k));
      }
    });
  
    const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
    const a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download="ranges_backup.json";
    a.click();
  }
  
  /* IMPORT */
  function importAll(){
    const input=document.createElement("input");
    input.type="file";
    input.accept="application/json";
  
    input.onchange=e=>{
      const reader=new FileReader();
      reader.onload=()=>{
        const data=JSON.parse(reader.result);
        Object.entries(data).forEach(([k,v])=>{
          localStorage.setItem(k,JSON.stringify(v));
        });
        build();
        alert("✅ Import terminé");
      };
      reader.readAsText(e.target.files[0]);
    };
  
    input.click();
  }
  
  /* COACH */
  const coachBtn=document.getElementById("coachToggle");
  coachBtn.onclick=()=>{
    coachMode=!coachMode;
    document.body.classList.toggle("coach-on",coachMode);
    coachBtn.textContent = coachMode ? "🧠 Coach : ON" : "🧠 Coach : OFF";
    
    updateClearBtn();
  };
  
  /* EVENTS */
  action.onchange=()=>{updateUI();build();};
  position.onchange=build;
  stack.onchange=build;
  
  /* INIT */
  updateUI();
  build();
  initClearButton();
  updateClearBtn();
  
function updateTotalStats(saved){

  let totalCombos = 0;

  function getCombos(hand){
    if(hand[0] === hand[1]) return 6;
    if(hand.endsWith("s")) return 4;
    return 12;
  }

  Object.entries(saved).forEach(([hand, obj]) => {

    const hasActive = Object.keys(obj).some(k => k !== "fold");

    if(hasActive){
      totalCombos += getCombos(hand);
    }

  });

  const percent = (totalCombos / 1326 * 100).toFixed(2);

  document.getElementById("totalStats").textContent =
    `📊 ${percent}%`;
}
function initClearButton(){

  const clearBtn = document.getElementById("clearRange");

  function updateClearBtn(){
    clearBtn.disabled = coachMode;
    clearBtn.style.opacity = coachMode ? "0.5" : "1";
  }

  clearBtn.onclick = ()=>{
    if(coachMode) return;

    if(confirm("Effacer la range actuelle ?")){
      localStorage.removeItem(rangeKey());
      build();
    }
  };

  // rendre dispo globalement
  window.updateClearBtn = updateClearBtn;

  updateClearBtn();
}
   
  </script>
  
  </body>
  </html>
