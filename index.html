<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Poker Ranges MTT Pro</title>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<style>
:root{
  --panel:#141820;
  --border:#1f2633;
  --text:#fff;
  --muted:#8a93a3;

  --utg:#2ecc71;
  --utg1:#2F8F6B;
  --hj:#9b59b6;
  --co:#3498db;
  --btn:#f39c12;
  --sb:#ff5c5c;
  --bb:#8f2d2d;

  --fold:#343b4a;
  --info:#7aa2ff;
  --info-active:#2ecc71;
}

body{
  margin:0;
  background:radial-gradient(circle at top,#121621,#07090c);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,Arial;
}

header{
  padding:14px;
  text-align:center;
  font-weight:800;
  background:#0a0c11;
  border-bottom:1px solid var(--border);
}

.container{padding:12px}

select,button{
  width:100%;
  padding:12px;
  margin-bottom:10px;
  border-radius:10px;
  border:1px solid var(--border);
  background:var(--panel);
  color:var(--text);
  font-size:15px;
  font-weight:600;
}

.buttons{display:flex;gap:8px}

.grid{
  display:grid;
  grid-template-columns:repeat(13, 1fr);
  gap:2px;
}

.cell{
  aspect-ratio:1/1;
  font-size:clamp(10px, 2.6vw, 14px);
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:8px;
}

@media (min-width:768px){
  .grid{
    grid-template-columns:repeat(13, 52px);
    width:calc(13 * 52px + 24px);
    margin:0 auto;
  }
}

@media (min-width:1200px){
  .grid{
    grid-template-columns:repeat(13, 60px);
    width:calc(13 * 60px + 24px);
  }
}

.fold{background:var(--fold);color:var(--muted)}
.utg{background:var(--utg)}
.utg1{background:var(--utg1)}
.hj{background:var(--hj)}
.co{background:var(--co)}
.btn{background:var(--btn);color:#000}
.sb{background:var(--sb)}
.bb{background:var(--bb)}

.legend{
  display:flex;
  justify-content:space-between;
  font-size:12px;
  margin:8px 0;
  color:var(--muted);
}

.box{
  width:12px;
  height:12px;
  border-radius:3px;
}

#percent{
  text-align:center;
  font-weight:700;
  margin:8px 0;
}

.coach-on .cell{
  pointer-events:none;
  filter:brightness(.9);
}

#infoBtn{
  padding:10px;
  border-radius:10px;
  border:1px solid var(--border);
  background:#0e1220;
  color:var(--info);
}

#infoBtn.active{
  color:var(--info-active);
}

.info-bubble{
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:12px;
  padding:10px;
  margin-bottom:10px;
}

.hidden{display:none}

.export-zone{
  background:#07090c;
  padding:12px;
  border-radius:12px;
}

@media (hover:none){
  .cell:hover{
    transform:none;
    filter:none;
  }
}
</style>
</head>

<body>

<header>♠️ POKER RANGES — MTT PRO</header>

<div class="container">

<select id="action">
  <option value="open3bet">Open 3bet</option>
  <option value="open3betisolip">Open 3bet iso lip</option>
  <option value="call">Call</option>
  <option value="raise">Raise</option>
  <option value="allin">All-in</option>
</select>

<select id="position">
  <option value="utg">UTG</option>
  <option value="utg1">UTG+1</option>
  <option value="hj">HJ</option>
  <option value="co">CO</option>
  <option value="btn">BTN</option>
  <option value="sb">SB</option>
  <option value="bb">BB</option>
</select>

<select id="stack"></select>

<button id="infoBtn">ⓘ Notes</button>

<div id="infoBubble" class="info-bubble hidden">
  <textarea id="infoText"></textarea>
  <button id="saveInfo">💾 Save</button>
</div>

<div id="percent"></div>

<div class="grid-wrapper export-zone">

<div class="legend">
  <div><div class="box utg"></div>UTG</div>
  <div><div class="box utg1"></div>UTG+1</div>
  <div><div class="box hj"></div>HJ</div>
  <div><div class="box co"></div>CO</div>
  <div><div class="box btn"></div>BTN</div>
  <div><div class="box sb"></div>SB</div>
  <div><div class="box bb"></div>BB</div>
</div>

<div id="grid" class="grid"></div>

</div>

<div id="stats"></div>

<!-- LIGNE 1 -->
<div class="buttons">
  <button id="coachToggle">🧠 Coach : ON</button>
  <button id="viewMode">👁️ Viewer</button>
  <button onclick="exportImage()">📤 Image</button>
</div>

<!-- LIGNE 2 -->
<div class="buttons">
  <button onclick="exportAll()">💾 Export ranges</button>
  <button onclick="importAll()">📂 Import ranges</button>
</div>

<script>
const ranks=["A","K","Q","J","T","9","8","7","6","5","4","3","2"];
const grid=document.getElementById("grid");
const stack=document.getElementById("stack");
const percent=document.getElementById("percent");
const action=document.getElementById("action");
const position=document.getElementById("position");

let coachMode=true;
let viewMode=false;

const ACTIONS={
  open3bet:["Debut","Milieu","Fin"],
  open3betisolip:["iso"],
  call:["2bb"],
  raise:["2bb"],
  allin:["≤15bb","≤12bb","≤8bb"]
};

function updateStack(){
  stack.innerHTML="";
  ACTIONS[action.value].forEach(v=>{
    const o=document.createElement("option");
    o.textContent=v;
    stack.appendChild(o);
  });
}

function rangeKey(){
  return `range_${action.value}_${position.value}_${stack.value}`;
}

function build(){
  grid.innerHTML="";
  const saved=JSON.parse(localStorage.getItem(rangeKey())||"{}");

  ranks.forEach((r,i)=>ranks.forEach((c,j)=>{
    const h=i===j?r+r:i<j?r+c+"s":c+r+"o";
    const d=document.createElement("div");
    d.className="cell "+(saved[h]?.pos||"fold");
    d.textContent=h;

    d.onclick=()=>{
      if(coachMode) return;
      if(saved[h]) delete saved[h];
      else saved[h]={pos:position.value};
      localStorage.setItem(rangeKey(),JSON.stringify(saved));
      build();
    };

    grid.appendChild(d);
  }));

  updatePercent(saved);
}

function updatePercent(saved){
  const count=Object.keys(saved).length;
  percent.textContent=`${(count/169*100).toFixed(1)}%`;
}

function exportImage(){
  const wrapper=document.querySelector('.export-zone');

  const name=[
    action.value.toUpperCase(),
    position.value.toUpperCase(),
    stack.value
  ].join("_");

  html2canvas(wrapper,{scale:2}).then(c=>{
    const a=document.createElement("a");
    a.href=c.toDataURL();
    a.download=name+".png";
    a.click();
  });
}

const coachBtn = document.getElementById("coachToggle");

coachBtn.onclick=()=>{
  coachMode=!coachMode;
  document.body.classList.toggle("coach-on",coachMode);
  coachBtn.textContent = coachMode ? "🧠 Coach : ON" : "🧠 Coach : OFF";
};

document.getElementById("viewMode").onclick=()=>{
  viewMode=!viewMode;
};

action.onchange=()=>{updateStack();build();};
position.onchange=build;
stack.onchange=build;

updateStack();
build();

function exportAll(){
  const data={};

  Object.keys(localStorage).forEach(k=>{
    if(k.startsWith("range_")){
      data[k]=JSON.parse(localStorage.getItem(k));
    }
  });

  const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="ranges_backup.json";
  a.click();
}

function importAll(){
  const input=document.createElement("input");
  input.type="file";
  input.accept="application/json";

  input.onchange=e=>{
    const reader=new FileReader();
    reader.onload=()=>{
      const data=JSON.parse(reader.result);
      Object.entries(data).forEach(([k,v])=>{
        localStorage.setItem(k,JSON.stringify(v));
      });
      build();
      alert("✅ Import terminé");
    };
    reader.readAsText(e.target.files[0]);
  };

  input.click();
}

</script>

</body>
</html>
